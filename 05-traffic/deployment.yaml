apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  labels:
    app: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
        - name: traffic-generator
          image: traffic-gen:v1
          imagePullPolicy: IfNotPresent
          command: ["/traffic-gen"]
          args: ["-url", "http://myapp-service.default.svc.cluster.local:8080"]
