apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "telegraf"
        static_configs:
          - targets: ["telegraf.monitoring.svc.cluster.local:9273"]

      - job_name: "myapp"
        scrape_interval: 5s
        metrics_path: /metrics
        static_configs:
          - targets: ["myapp-service.default.svc.cluster.local:8080"]
